{% extends "base.html" %}
{% block title %}Credit Score{% endblock %}

{% block content %}
<style>

.cs-page, .cs-page *{
  font-family: "Ovelion", system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
}
  /* page layout: top */
  .wrap{
    align-items:flex-start;
    justify-content:center;
    padding-top: 92px;
    padding-bottom: 40px;
  }
  @media(max-width:480px){
    .wrap{ padding-top: 78px; }
  }

  /* small card like user card */
  .cs-card{
    width:min(520px, 94vw);
    background: rgba(20, 28, 28, .58);
    border: 1px solid rgba(255,255,255,.10);
    box-shadow: 0 12px 40px rgba(0,0,0,.45);
    border-radius: 18px;
    padding: 14px;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    text-align:left;
    animation: cardSwipe .45s ease both;
  }
  @keyframes cardSwipe{
    from{ opacity:0; transform: translateX(16px) scale(.99); }
    to{ opacity:1; transform: translateX(0) scale(1); }
  }

  .cs-head{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:10px;
    margin-bottom:10px;
  }
  .cs-title{
    font-size:18px;
    font-weight:950;
    color:#fff;
    line-height:1.1;
  }
  .cs-sub{
    font-size:12px;
    color: rgba(255,255,255,.72);
    margin-top:2px;
  }
  .cs-pill{
    padding:6px 12px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,.10);
    background: rgba(0,0,0,.25);
    color:#dfffe9;
    font-weight:900;
    font-size:12px;
    white-space:nowrap;
  }

  .cs-scorebox{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    padding:12px 12px;
    border-radius:16px;
    border:1px solid rgba(255,255,255,.10);
    background: rgba(0,0,0,.22);
  }
  .cs-label{
    font-weight:900;
    color:#fff;
    font-size:13px;
  }
  .cs-note{
    font-size:11px;
    opacity:.75;
    color:#eafff1;
    margin-top:2px;
  }
  .cs-score{
    font-size:28px;
    font-weight:950;
    letter-spacing:.02em;
    color:#fff;
  }

  .cs-actions{
    margin-top:12px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
  }
  .cs-actions .btn{
    padding:10px 16px;
    font-size:13px;
  }
  /* === Blue theme override (Credit Score only) === */
.btn-primary{
  border: 0 !important;
  background: linear-gradient(90deg, #004182, #054585d0) !important;
  color: #ffffff !important;
  box-shadow: 0 12px 30px rgba(0,0,0,.35) !important;
}

.btn-primary:active{
  transform: scale(.98);
}

.cs-danger{
  background: rgba(120, 10, 10, .55) !important;
  border-color: rgba(255, 80, 80, .35) !important;
  box-shadow: 0 14px 44px rgba(255, 60, 60, .18), 0 12px 40px rgba(0,0,0,.45) !important;
}
.cs-danger .cs-pill{
  background: rgba(255, 30, 30, .18) !important;
  border-color: rgba(255, 90, 90, .35) !important;
  color: #ffd6d6 !important;
}
.cs-danger .cs-scorebox{
  background: rgba(0,0,0,.18) !important;
  border-color: rgba(255, 90, 90, .22) !important;
}
.cs-danger .cs-score{
  color: #ff6b6b !important;
}
/* =========================
   ✅ CREDIT SCORE = WHITE CARD (wallet-style)
   ========================= */

.cs-card{
  position: relative !important;
  overflow:hidden !important;

  background: linear-gradient(180deg,#ffffff 0%,#f8fafc 45%,#eef2f7 75%,#ffffff 100%) !important;

  border: 2px solid rgba(212,175,55,.85) !important;
  box-shadow: 0 20px 45px rgba(0,0,0,.12),
              0 0 0 1px rgba(255,255,255,.9) inset !important;

  backdrop-filter: blur(14px) !important;
  -webkit-backdrop-filter: blur(14px) !important;
}

.cs-card::before{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  background:
    radial-gradient(circle at 90% 90%, rgba(212,175,55,.25), transparent 55%),
    radial-gradient(circle at 10% 10%, rgba(0,65,130,.08), transparent 60%);
  opacity:.75;
}
.cs-card::after{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  background: linear-gradient(180deg, rgba(255,255,255,.9), rgba(255,255,255,0) 55%);
  opacity:.6;
}
.cs-card > *{ position:relative; z-index:1; }

/* text -> blue */
.cs-title, .cs-label, .cs-score{ color:#0b2f55 !important; }
.cs-sub, .cs-note{ color: rgba(11,47,85,.72) !important; }

.cs-pill{
  border: 1px solid rgba(11,47,85,.16) !important;
  background: rgba(11,47,85,.06) !important;
  color:#0b2f55 !important;
}

/* inner score box -> light panel */
.cs-scorebox{
  border: 1px solid rgba(11,47,85,.14) !important;
  background: rgba(11,47,85,.04) !important;
}

/* ⚠️ remove old "danger red theme" look, keep readable even if low score */
.cs-danger{
  background: linear-gradient(180deg,#ffffff 0%,#f8fafc 45%,#eef2f7 75%,#ffffff 100%) !important;
  border-color: rgba(212,175,55,.85) !important;
  box-shadow: 0 20px 45px rgba(0,0,0,.12),
              0 0 0 1px rgba(255,255,255,.9) inset !important;
}
.cs-danger .cs-score{ color:#c62828 !important; } /* still show low score in red */
.cs-danger .cs-pill{
  background: rgba(198,40,40,.06) !important;
  border-color: rgba(198,40,40,.18) !important;
  color:#c62828 !important;
}
.cs-danger .cs-scorebox{
  background: rgba(198,40,40,.04) !important;
  border-color: rgba(198,40,40,.14) !important;
}
/* ✅ Back button on WHITE card (visible, not blending) */
.btn-ghost{
  background: #ffffff !important;
  color: #0b2f55 !important;                 /* blue text */
  border: 2px solid rgba(11,47,85,.22) !important;
  box-shadow: 0 10px 22px rgba(0,0,0,.14),
              0 0 0 1px rgba(255,255,255,.9) inset !important;
}

.btn-ghost:hover{
  transform: translateY(-1px);
  box-shadow: 0 14px 28px rgba(0,0,0,.16),
              0 0 0 1px rgba(255,255,255,.9) inset !important;
}

.btn-ghost:active{
  transform: scale(.98);
}
</style>

{% with cs=request.user.credit_score|default:650 %}
<div class="cs-card cs-page {% if cs|add:0 < 570 %}cs-danger{% endif %}">
  <div class="cs-head">
    <div>
      <div class="cs-title">Credit Score</div>
    </div>
    <div class="cs-pill">Score</div>
  </div>

  <div class="cs-scorebox">
    <div>
      <div class="cs-label">Current Score</div>
      <div class="cs-note">Based on account history</div>
    </div>
    <div class="cs-score">{{ cs }}</div>
  </div>

  <div class="cs-actions">
    <a class="btn btn-ghost" href="/profile/">Back</a>
    <a class="btn btn-primary" href="/dashboard/">Dashboard</a>
  </div>
</div>
{% endwith %}
{% endblock %}
