{% load static %}
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Control Panel</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,system-ui;}
body{
  background: radial-gradient(circle at 20% 20%, #0d1b3d, #050b1f 60%);
  color:#fff;
  min-height:100vh;
}

/* Layout */
.wrapper{
  display:flex;
  min-height:100vh;
}

/* Sidebar */
.sidebar{
  width:240px;
  background: rgba(12,18,45,.8);
  backdrop-filter: blur(20px);
  padding:30px 20px;
  border-right:1px solid rgba(255,255,255,.05);
}

.logo{
  font-weight:800;
  font-size:18px;
  margin-bottom:40px;
  color:#7aa2ff;
}

.nav a{
  display:block;
  padding:12px 14px;
  margin-bottom:10px;
  border-radius:12px;
  text-decoration:none;
  color:#cfd6ff;
  transition:.2s;
}
.nav a:hover{
  background:rgba(122,162,255,.15);
  color:#fff;
}

/* Main */
.main{
  flex:1;
  padding:40px;
}

/* Cards */
.cards{
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(260px,1fr));
  gap:25px;
  margin-bottom:30px;
}

.card{
  background: rgba(18,26,60,.8);
  backdrop-filter: blur(25px);
  border-radius:20px;
  padding:25px;
  box-shadow:0 10px 40px rgba(0,0,0,.5);
  position:relative;
  overflow:hidden;
}

.card::before{
  content:"";
  position:absolute;
  top:-50%;
  right:-50%;
  width:200%;
  height:200%;
  background: radial-gradient(circle,#2f5bff55,transparent 60%);
  transform:rotate(25deg);
}

.card h3{
  font-size:14px;
  opacity:.7;
  margin-bottom:8px;
}

.card .value{
  font-size:28px;
  font-weight:700;
}

.card small{
  color:#7aa2ff;
}

/* Table */
.table-card{
  background: rgba(18,26,60,.85);
  border-radius:20px;
  padding:25px;
  box-shadow:0 10px 40px rgba(0,0,0,.5);
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:14px 10px;
  text-align:left;
}

th{
  opacity:.6;
  font-size:13px;
}

tr{
  border-bottom:1px solid rgba(255,255,255,.05);
}

tr:last-child{
  border-bottom:none;
}
</style>
</head>

<body>

<div class="wrapper">

  <div class="sidebar">
    <div class="logo">NeuroControl</div>
    <div class="nav">
      <a href="#">Dashboard</a>
      <a href="#">Users</a>
      <a href="#">Loans</a>
      <a href="#">Transactions</a>
      <a href="#">Reports</a>
      <a href="/admin/">Admin Site</a>
    </div>
  </div>

  <div class="main" style="padding:24px;">
  <div class="card" style="padding:14px;">
    <h3 style="margin-bottom:10px;opacity:.85;">Admin Panel</h3>

    <div style="height:75vh;border-radius:18px;overflow:hidden;border:1px solid rgba(255,255,255,.08);">
      <iframe
        src="/admin/"
        style="width:100%;height:100%;border:0;background:#fff;"
      ></iframe>
    </div>
  </div>
</div>

</body>
</html>
