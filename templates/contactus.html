{% extends "base.html" %}
{% load static %}
{% block title %}Contact{% endblock %}

{% block content %}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>

.page, .page * {
  font-family: "Outfit", system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
}

.wrap {
  align-items: flex-start !important;
  justify-content: center !important;
  padding-top: 28px !important;
}

.page {
  width: min(480px, 94vw);
  margin: 0 auto;
  padding: 0 16px 60px;
  box-sizing: border-box;
}

/* Back button */
.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  height: 38px;
  padding: 0 16px 0 12px;
  border-radius: 999px;
  background: #ffffff;
  color: #FF6B00;
  font-weight: 700;
  font-size: 13px;
  text-decoration: none;
  border: 1px solid #FFD4A3;
  box-shadow: 0 2px 10px rgba(255,107,0,.12);
  transition: transform .15s ease, box-shadow .15s ease;
  margin-bottom: 18px;
}
.back-btn svg{ width: 16px; height: 16px; }
.back-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(255,107,0,.20); }
.back-btn:active { transform: scale(.98); }

/* Main card */
.cardx {
  background: #ffffff;
  border-radius: 20px;
  border: 1.5px solid #FFD4A3;
  border-top: 4px solid #FF6B00;
  box-shadow: 0 8px 28px rgba(255,107,0,.14), 0 2px 8px rgba(0,0,0,.04);
  padding: 22px;
  color: #1a1a1a;
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
}

.title {
  font-weight: 800;
  font-size: 17px;
  letter-spacing: .02em;
  margin: 0 0 6px;
  color: #1a1a1a;
}

.sub {
  font-size: 13px;
  color: #9a9a9a;
  margin: 0;
}

/* Field rows (icon badge + input) */
.field-row-wrap {
  display: flex;
  align-items: flex-start;
  gap: 13px;
  margin-top: 16px;
}
.field-row-wrap:first-of-type{ margin-top: 0; }
.field-icon {
  flex: 0 0 auto;
  width: 38px; height: 38px;
  border-radius: 12px;
  background: linear-gradient(135deg, #FFE9D6, #FFD4A3);
  color: #FF6B00;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: 2px;
}
.field-icon svg{ width: 18px; height: 18px; }
.field-row-wrap:focus-within .field-icon {
  background: linear-gradient(135deg, #FF6B00, #FF8A33);
  color: #fff;
}
.field-main { flex: 1; min-width: 0; }

/* Labels */
label {
  display: block;
  font-size: 11px;
  font-weight: 700;
  color: #9a9a9a;
  text-transform: uppercase;
  letter-spacing: .04em;
  margin: 0 0 6px;
}

/* Inputs and textarea */
input, textarea {
  width: 100%;
  box-sizing: border-box;
  border-radius: 12px;
  border: 1.5px solid #E6E6E6;
  background: #FFFAF5;
  color: #1a1a1a;
  padding: 11px 14px;
  outline: none;
  font-size: 14px;
  font-weight: 500;
  font-family: inherit;
  transition: border-color 0.2s ease, box-shadow 0.2s ease;
}

input::placeholder, textarea::placeholder {
  color: #9a9a9a;
}

textarea {
  min-height: 100px;
  resize: none;
}

input:focus, textarea:focus {
  border-color: #FF6B00;
  box-shadow: 0 0 0 3px rgba(255,107,0,.16);
  background: #fff;
}

/* Send button */
.btn {
  width: 100%;
  margin-top: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  border: none;
  border-radius: 999px;
  padding: 15px 16px;
  font-weight: 700;
  font-size: 14px;
  letter-spacing: .04em;
  text-transform: uppercase;
  color: #fff;
  cursor: pointer;
  background: linear-gradient(135deg, #FF6B00, #FF8A33);
  box-shadow: 0 8px 22px rgba(255,107,0,.32);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}
.btn svg{ width: 16px; height: 16px; }

.btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 26px rgba(255,107,0,.40);
}

.btn:active {
  transform: translateY(1px);
}

/* Success alert */
.alert-success {
  background: #FFE9D6;
  border-left: 4px solid #FF6B00;
  border-radius: 12px;
  padding: 14px;
  color: #b8530a;
  font-weight: 700;
  font-size: 14px;
  margin-bottom: 14px;
}

.muted {
  font-size: 12px;
  color: #9a9a9a;
  margin-top: 10px;
}

/* Mobile adjustments */
@media (max-width: 520px) {
  .page { padding: 0 12px 60px; }
}
</style>

<div class="page">

  <a class="back-btn" href="javascript:history.back()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M14 6l-6 6 6 6"/></svg>
    Back
  </a>

  <div class="cardx">
    <div class="title">Contact Us</div>
    <p class="sub">Send us a message — we will contact you soon.</p>
  </div>

  {% if sent %}
    <div class="alert-success">
      ✅ Thank you! We will contact you soon.
    </div>
  {% endif %}

  <div class="cardx">
    <form method="POST" action="/contact/">
      {% csrf_token %}

      <div class="field-row-wrap">
        <div class="field-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
        <div class="field-main">
          <label>Full name</label>
          <input type="text" name="full_name" required>
        </div>
      </div>

      <div class="field-row-wrap">
        <div class="field-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
        </div>
        <div class="field-main">
          <label>Phone / WhatsApp</label>
          <input type="tel" name="phone" required>
        </div>
      </div>

      <div class="field-row-wrap">
        <div class="field-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16v16H4z" opacity="0"/><path d="M3 12h18M3 6h18M3 18h12"/></svg>
        </div>
        <div class="field-main">
          <label>Subject (optional)</label>
          <input type="text" name="subject">
        </div>
      </div>

      <div class="field-row-wrap">
        <div class="field-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        </div>
        <div class="field-main">
          <label>Message</label>
          <textarea name="message" required></textarea>
        </div>
      </div>

      <button class="btn" type="submit">
        <span>Send Message</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14m-7-7l7 7-7 7"/></svg>
      </button>
    </form>
  </div>

</div>
{% endblock %}
